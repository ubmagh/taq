all:
  vars:
    ansible_user: ubuntu
  hosts:
    bastion:
      ansible_host: 10.0.0.1
      ansible_ssh_private_key_file: ~/.ssh/id_rsa
  children:
    production:
      vars:
        ansible_user: deploy
      hosts:
        db-01:
          ansible_host: 10.0.1.10
          ansible_port: 2222
      children:
        webservers:
          hosts:
            web-01:
              ansible_host: 10.0.1.20
            web-02:
              ansible_host: 10.0.1.21
              ansible_user: admin
    staging:
      hosts:
        staging-01:
          ansible_host: 10.0.2.10
        # hostname used as address when ansible_host is absent
        192.168.99.10:
