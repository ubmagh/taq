name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v4
        with:
          go-version: '1.25'

      - name: Build
        run: go build -ldflags "-X main.version=$(git describe --tags --always --dirty)" -v ./...

      - name: Vet
        run: go vet ./...
