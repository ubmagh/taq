name: new release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.25'

    - name: Build binaries
      run: |
        mkdir -p dist
        GOOS=linux   GOARCH=arm64 go build -o dist/taq-linux-arm64
        GOOS=linux   GOARCH=amd64 go build -o dist/taq-linux-amd64
        GOOS=darwin  GOARCH=amd64 go build -o dist/taq-darwin-amd64
        GOOS=windows GOARCH=amd64 go build -o dist/taq-windows-amd64.exe

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/*
        token: ${{ secrets.GITHUB_TOKEN }}