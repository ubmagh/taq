name: new release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.25'

    - name: Build binaries
      run: |
        mkdir -p dist
        GOOS=linux   GOARCH=amd64 go build -o dist/taq-linux-amd64
        GOOS=darwin  GOARCH=amd64 go build -o dist/taq-darwin-amd64
        GOOS=windows GOARCH=amd64 go build -o dist/taq-windows-amd64.exe

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/*
      env:
        GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
